<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="value" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p>Use <strong>Mouse Y</strong> or <strong>Arrow Keys (↑↓)</strong> to control the left paddle</p>
            <p>Computer controls the right paddle</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
